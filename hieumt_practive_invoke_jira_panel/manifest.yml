modules:
  jira:issuePanel:
    - key: issue-details-tracker-issue-panel
      resource: main
      resolver:
        function: resolver-func
      render: native
      title: Issue Details Tracker
      icon: https://developer.atlassian.com/platform/forge/images/icons/issue-panel-icon.svg
  function:
    - key: resolver-func
      handler: index.handler
resources:
  - key: main
    path: src/frontend/index.jsx
permissions:
  scopes:
    - read:jira-work
app:
  runtime:
    name: nodejs24.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/46a684fd-2056-4438-a2d9-1dbf5d67cf74
