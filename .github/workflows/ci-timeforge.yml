name: CI TimeForge

on:
  pull_request:
    paths:
      - 'timeforge/**'
      - '.github/workflows/ci-timeforge.yml'
  push:
    branches:
      - main
    paths:
      - 'timeforge/**'
      - '.github/workflows/ci-timeforge.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: timeforge

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test
