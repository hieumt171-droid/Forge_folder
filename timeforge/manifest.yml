modules:
  jira:timeTrackingProvider:
    - key: timeforge-provider
      name: TimeForge Time Tracking

  jira:issueAction:
    - key: timeforge-log-work-action
      title: Log Work (TimeForge)
      resource: log-work-form
      resolver:
        function: resolver
      render: native
      displayConditions:
        timeTrackingProviderEnabled:
          key: timeforge-provider

  jira:issueActivity:
    - key: timeforge-work-log-activity
      resource: work-log-list
      resolver:
        function: resolver
      render: native
      title: Work Log (TimeForge)
      displayConditions:
        timeTrackingProviderEnabled:
          key: timeforge-provider

  jira:issuePanel:
    - key: timeforge-panel
      resource: issue-panel
      resolver:
        function: resolver
      render: native
      title: TimeForge
      icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><circle cx="16" cy="16" r="14" fill="%230052CC"/><path d="M16 8v9l6 3" stroke="%23fff" stroke-width="2.5" fill="none" stroke-linecap="round"/></svg>'
      displayConditions:
        timeTrackingProviderEnabled:
          key: timeforge-provider

  jira:globalPage:
    - key: timeforge-timesheet
      resource: timesheet
      resolver:
        function: resolver
      render: native
      title: My Timesheet

  sql:
    - key: main
      engine: mysql

  scheduledTrigger:
    - key: timeforge-migration
      function: runMigration
      interval: fiveMinute

  function:
    - key: resolver
      handler: index.handler
    - key: runMigration
      handler: index.runMigration

resources:
  - key: issue-panel
    path: src/frontend/issue-panel.jsx
  - key: timesheet
    path: src/frontend/timesheet.jsx
  - key: log-work-form
    path: src/frontend/log-work-form.jsx
  - key: work-log-list
    path: src/frontend/work-log-list.jsx

permissions:
  scopes:
    - storage:app
    - read:jira-work
    - read:jira-user

app:
  runtime:
    name: nodejs24.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/21927b83-18e3-497b-abd4-41905962624b
