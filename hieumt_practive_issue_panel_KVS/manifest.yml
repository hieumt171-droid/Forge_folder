modules:
  jira:issuePanel:
    - key: hieumt-practive-issue-panel-kvs-hello-world-issue-panel
      resource: main
      resolver:
        function: resolver
      render: native
      title: Cài đặt Cá nhân
      icon: https://developer.atlassian.com/platform/forge/images/icons/issue-panel-icon.svg
  function:
    - key: resolver
      handler: index.handler
resources:
  - key: main
    path: src/frontend/index.jsx
permissions:
  scopes:
    - storage:app
app:
  runtime:
    name: nodejs24.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/99cdfec1-7c5c-4c8d-b547-b7ac43ff7729
